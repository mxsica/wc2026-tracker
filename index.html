<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WC 2026 ✌️</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WC 2026 ✌️">
<style>
  :root {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --surface2: #f0f0f0;
    --border: #e0e0e0;
    --text: #111111;
    --text2: #555555;
    --text3: #888888;
    --accent: #1a56db;
    --live: #dc2626;
    --soon: #16a34a;
    --done: #888888;
    --chip-active-bg: #111111;
    --chip-active-text: #ffffff;
    --chip-bg: #e8e8e8;
    --chip-text: #333333;
    --tab-active: #111111;
    --radius: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f0f;
      --surface: #1c1c1c;
      --surface2: #252525;
      --border: #333333;
      --text: #f0f0f0;
      --text2: #aaaaaa;
      --text3: #666666;
      --accent: #4d8eff;
      --chip-active-bg: #f0f0f0;
      --chip-active-text: #111111;
      --chip-bg: #2a2a2a;
      --chip-text: #cccccc;
      --tab-active: #f0f0f0;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
  body { max-width: 480px; margin: 0 auto; min-height: 100dvh; }

  /* HEADER */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 0;
    padding-top: calc(12px + env(safe-area-inset-top));
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; padding-bottom: 12px; }
  .header-title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 4px; }
  .header-title span { color: var(--text3); font-weight: 400; font-size: 14px; margin-left: 6px; }
  .error-banner { display: none; background: rgba(245,158,11,0.12); color: #f59e0b; font-size: 12px;
    text-align: center; padding: 6px 16px; border-bottom: 1px solid rgba(245,158,11,0.2); }

  /* TABS */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin: 0 -16px; }
  .tab {
    flex: 1; padding: 10px 4px; text-align: center; font-size: 13px; font-weight: 500;
    color: var(--text3); border-bottom: 2px solid transparent; cursor: pointer;
    transition: color 0.15s; user-select: none;
  }
  .tab.active { color: var(--tab-active); border-bottom-color: var(--tab-active); }

  /* GROUP CHIPS */
  .chips-wrap { overflow-x: auto; padding: 10px 16px; display: flex; gap: 8px; scrollbar-width: none; background: var(--bg); }
  .chips-wrap::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
    background: var(--chip-bg); color: var(--chip-text); cursor: pointer; user-select: none;
    transition: background 0.15s, color 0.15s; min-height: 32px; display: flex; align-items: center;
  }
  .chip.active { background: var(--chip-active-bg); color: var(--chip-active-text); }
  .chip.upcoming-chip { background: rgba(22,163,74,0.12); color: #4ade80; }
  .chip.upcoming-chip.active-green { background: #14532d; color: #86efac; }
  .chip.past-chip { background: rgba(148,163,184,0.10); color: #94a3b8; }
  .chip.past-chip.active-past { background: #1e293b; color: #cbd5e1; }

  /* MATCH LIST */
  .match-list { padding: 0 16px 100px; }
  .last-updated { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .round-header {
    font-size: 17px; font-weight: 800; color: var(--text);
    padding: 28px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 2px;
  }
  .date-header {
    font-size: 13px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
    color: var(--text); padding: 20px 0 10px;
  }
  .match-card {
    background: var(--surface); border-radius: var(--radius); margin-bottom: 8px;
    padding: 14px 16px; cursor: pointer; border: 1px solid var(--border);
    transition: opacity 0.15s;
  }
  .match-card:active { opacity: 0.7; }
  .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .card-group { font-size: 13px; color: var(--text3); cursor: pointer; }
  .card-group:hover { color: var(--text2); }
.card-cal-btn { font-size: 12px; color: var(--text3); cursor: pointer; white-space: nowrap; }
  .card-cal-btn:active { opacity: 0.6; }
  .card-time { font-size: 13px; color: var(--text); }
  .card-time.done { color: var(--text3); }
  .card-time.live { color: var(--live); font-weight: 600; }
  .live-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--live); margin-right: 5px; vertical-align: middle; animation: live-pulse 1.2s ease-in-out infinite; }
  @keyframes live-pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.35; transform:scale(0.65); } }
  .card-break { font-size: 11px; color: #38bdf8; background: rgba(56,189,248,0.12); border-radius: 4px; padding: 3px 8px; margin-bottom: 8px; text-align: center; }
  .card-teams { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .ct-home { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .ct-flag { font-size: 22px; flex-shrink: 0; line-height: 1; }
  .ct-name { font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; }
  .ct-vs { font-size: 20px; color: var(--text3); flex-shrink: 0; padding: 0 4px; line-height: 1; }
  .ct-vs.live { color: var(--live); }
  .ct-vs.done { color: var(--text); }
  .ct-away { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; justify-content: flex-end; }
  .ct-away .ct-name { text-align: right; }
  .card-scorers { display: flex; justify-content: space-between; gap: 8px; margin-top: 6px; margin-bottom: 10px; font-size: 12px; color: var(--text); line-height: 1.6; }
  .card-scorers-home { max-width: 50%; }
  .card-scorers-away { text-align: right; max-width: 50%; }
  .card-bottom { display: flex; justify-content: space-between; align-items: center; }
  .card-bottom-right { display: flex; align-items: center; gap: 6px; }
  .card-venue { font-size: 12px; color: var(--text3); }
  .card-cd { font-size: 12px; color: var(--text3); }
  .card-cd.soon { color: var(--soon); font-weight: 600; }
  .card-cd.live { color: var(--live); font-weight: 600; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 15px; }

  /* STANDINGS */
  .standings-wrap { margin-bottom: 8px; }
  .group-fixture-chips { display: flex; gap: 8px; padding: 4px 0 0; }
  .standings-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
    color: var(--text3); padding: 20px 0 8px;
  }
  .standings-label-link { cursor: pointer; }
  .standings-label-link:hover { color: var(--text); }
  .standings-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
  }
  .standings-table { width: 100%; border-collapse: collapse; }
  .standings-table th {
    font-size: 11px; font-weight: 600; color: var(--text3); text-align: right;
    padding: 8px 10px 8px 0; border-bottom: 1px solid var(--border);
  }
  .standings-table th:first-child { text-align: left; padding-left: 14px; }
  .standings-table td {
    font-size: 13px; color: var(--text2); text-align: right;
    padding: 11px 10px 11px 0;
  }
  .standings-table td:first-child { text-align: left; padding-left: 0; }
  .standings-table tr { border-bottom: 1px solid var(--border); }
  .standings-table tr:last-child { border-bottom: none; }
  .standings-table tr.qualify { background: rgba(22,163,74,0.06); }
  .standings-table tr.qualify td:first-child { border-left: 3px solid var(--soon); padding-left: 11px; }
  .standings-table tr.best-third { background: rgba(234,179,8,0.07); }
  .standings-table tr.best-third td:first-child { border-left: 3px solid #ca8a04; padding-left: 11px; }
  .standings-table tr:not(.qualify):not(.best-third) td:first-child { padding-left: 14px; }
  .standings-table .td-team { display: flex; align-items: center; gap: 8px; }
  .standings-table .td-flag { font-size: 18px; flex-shrink: 0; }
  .standings-table .td-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .standings-table .td-pts { font-weight: 700; color: var(--text); }

  .highlight { border-left: 3px solid var(--accent); }

  /* BRACKETS */
  .status-banner {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 14px; margin: 12px 0 4px;
  }
  .status-banner-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .status-banner-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .status-banner-sub { font-size: 12px; color: var(--text3); }
  .progress-bar-track { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--soon); border-radius: 2px; transition: width 0.3s; }
  .ct-name-tbd { font-size: 17px; font-weight: 700; color: var(--text3); }
.grp-link { cursor: pointer; }

  /* BRACKET TREE / COLUMNS VIEWS — shared */
  .btree-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 0; }
  .btree-wrap--cols { overflow-y: hidden; }
  .btree-cols { display: flex; min-width: max-content; align-items: flex-start; }
  .btree-col-label {
    font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text); text-align: center; padding: 12px 0 10px; white-space: nowrap;
    position: sticky; top: 0; background: var(--bg); z-index: 3; flex-shrink: 0;
  }

  /* Columns view — full-width list cards, independent column scroll */
  .btree-wrap--cols .btree-cols { gap: 16px; padding: 0 16px 100px; height: calc(100svh - 130px); }
  .btree-wrap--cols .btree-col {
    flex: 0 0 min(calc(100vw - 80px), 400px); width: min(calc(100vw - 80px), 400px);
    display: flex; flex-direction: column;
    overflow-y: auto; overflow-x: hidden; height: 100%;
    scrollbar-width: none; -webkit-overflow-scrolling: touch;
  }
  .btree-wrap--cols .btree-col::-webkit-scrollbar { display: none; }
  .btree-wrap--cols .btree-slot { display: block; flex-shrink: 0; }

  /* Tree view — compact btcard pairs, SVG connectors, resets slot heights per pair */
  .btree-wrap--tree { overflow-y: auto; }
  .btree-pairs { display: flex; gap: 48px; padding: 12px 16px 48px; min-width: max-content; align-items: flex-start; }
  .btree-pair { position: relative; }
  .btree-wrap--tree .btree-cols { gap: 32px; }
  .btree-wrap--tree .btree-col { width: 188px; flex: 0 0 188px; display: flex; flex-direction: column; }
  .btree-wrap--tree .btree-slot { display: flex; align-items: center; box-sizing: border-box; }
  .btree-wrap--tree .btree-slot .match-card { margin: 0; width: 100%; box-sizing: border-box; }
  .btree-pair .btree-cols > .btree-col:nth-child(1) .btree-slot { height: 180px; }
  .btree-pair .btree-cols > .btree-col:nth-child(2) .btree-slot { height: 360px; }
  .btree-pair-svg { position: absolute; top: 0; left: 0; pointer-events: none; overflow: visible; }

  /* Tree card — compact vertical layout for bracket columns */
  .btcard { padding: 12px 14px !important; cursor: pointer; }
  .btcard-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .btcard-date { font-size: 12px; font-weight: 600; color: var(--text); }
  .btcard-time { font-size: 12px; color: var(--text3); }
  .btcard-team { display: flex; align-items: center; gap: 7px; min-height: 28px; }
  .btcard-flag { font-size: 22px; line-height: 1; flex-shrink: 0; }
  .btcard-name { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
  .btcard-tbd-label { font-size: 12px; font-weight: 600; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
  .btcard-flag-proj { font-size: 22px; line-height: 1; flex-shrink: 0; }
  .btcard-cand-flags { font-size: 15px; line-height: 1; flex-shrink: 0; letter-spacing: -2px; }
  .btcard-cand-flags-2row { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
  .btcard-cand-flags-2row > span { font-size: 15px; line-height: 1; letter-spacing: -2px; }
  .btcard-score { font-size: 16px; font-weight: 700; color: var(--text); margin-left: auto; flex-shrink: 0; padding-left: 6px; }
  .btcard-vs {
    font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
    color: var(--text3); display: flex; align-items: center; gap: 6px; padding: 5px 0;
  }
  .btcard-vs::before, .btcard-vs::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .btcard-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; gap: 6px; }
  .btcard-venue { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .btcard-bottom-right { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  .btcard-cd { font-size: 11px; color: var(--text3); }
  .btcard-cal { font-size: 14px; cursor: pointer; }

  /* STADIUMS VIEW */
  .stadium-list { display: flex; flex-direction: column; gap: 0; }
  .stadium-item { display: flex; justify-content: space-between; align-items: center;
    padding: 14px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .stadium-item:last-child { border-bottom: none; }
  .stadium-item-left { display: flex; flex-direction: column; gap: 2px; }
  .stadium-item-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .stadium-item-city { font-size: 12px; color: var(--text3); }
  .stadium-item-count { font-size: 12px; color: var(--text3); flex-shrink: 0; }
  .stadium-detail-back { font-size: 13px; color: var(--text3); cursor: pointer; padding: 10px 0 4px; display: inline-block; }
  .stadium-detail-back:hover { color: var(--text); }
  .stadium-detail-title { font-size: 18px; font-weight: 700; color: var(--text); padding-bottom: 2px; }
  .stadium-detail-city { font-size: 13px; color: var(--text3); padding-bottom: 12px; }
</style>
</head>

  kickoff: new Date(utc),
  venue, city, matchday
}));

// ─── ESPN NAME MAPPING ────────────────────────────────────────────────────────
const ESPN_NAME_MAP = {
  'Bosnia-Herzegovina': 'Bosnia & Herzegovina',
  'Türkiye':            'Turkey',
  'Curaçao':            'Curacao',
  'Congo DR':           'DR Congo',
};
function mapEspnName(n) { return ESPN_NAME_MAP[n] || n; }


// ─── LIVE STATE (overrides time-based matchStatus) ────────────────────────────
const ESPN_STATES = {}; // matchId → 'pre'|'in'|'post'

// ─── RESULTS & STANDINGS (populated by fetchLiveData) ────────────────────────
const RESULTS        = {};
const STANDINGS      = {};
const CLOCKS         = {}; // matchId → ESPN displayClock string for live games
const ESPN_EVENT_IDS = {}; // matchId → ESPN numeric event id (for summary fetches)
const SCORERS        = {}; // matchId → { home: [{name,minute}], away: [{name,minute}] }
const SCORER_DONE    = new Set(); // completed matchIds whose scorers are already cached
const STATUS_NAMES   = {}; // matchId → ESPN status type name + description (break detection)

function recomputeStandings() {
  for (const k of Object.keys(STANDINGS)) delete STANDINGS[k];
  const stats = {};
  for (const m of MATCHES) {
    const r = RESULTS[m.id];
    if (!r) continue;
    for (const [name, isHome] of [[m.home, true], [m.away, false]]) {
      if (!stats[name]) stats[name] = { name, p:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0 };
      const t = stats[name];
      const gf = isHome ? r.hs : r.as;
      const ga = isHome ? r.as : r.hs;
      t.p++; t.gf += gf; t.ga += ga; t.gd = t.gf - t.ga;
      if (gf > ga)       { t.w++; t.pts += 3; }
      else if (gf === ga) { t.d++; t.pts += 1; }
      else                { t.l++; }
    }
  }
  for (const grp of 'ABCDEFGHIJKL'.split('')) {
    const rows = Object.entries(TEAMS)
      .filter(([, t]) => t.group === grp)
      .map(([name]) => stats[name] || { name, p:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0 });
    rows.sort((a, b) =>
      b.pts - a.pts || b.gd - a.gd || b.gf - a.gf ||
      (TEAMS[a.name]?.ranking || 999) - (TEAMS[b.name]?.ranking || 999)
    );
    if (rows.some(t => t.p > 0)) STANDINGS[grp] = rows;
  }
}

function computeBestThirdSet() {
  const thirds = [];
  for (const g of 'ABCDEFGHIJKL'.split('')) {
    const rows = STANDINGS[g];
    if (!rows || rows.length < 3) continue;
    const t = rows[2];
    thirds.push({ ...t, ranking: TEAMS[t.name]?.ranking || 999 });
  }
  // Criteria: pts → gd → gf → FIFA ranking (lower = better)
  thirds.sort((a, b) =>
    b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.ranking - b.ranking
  );
  return new Set(thirds.slice(0, 8).map(t => t.name));
}

let pollHandle          = null;
let consecutiveFailures = 0;

function setLiveDot() {}

function setErrorBanner(show) {
  const el = document.getElementById('error-banner');
  if (el) el.style.display = show ? 'block' : 'none';
}

function checkPolling() {
  const now = Date.now();
  const anyActive = MATCHES.some(m => {
    const espn = ESPN_STATES[m.id];
    if (espn === 'post') return false;                          // ESPN confirmed done
    if (espn === 'in')   return true;                           // ESPN confirmed live
    const start = m.kickoff.getTime();
    return now >= start && now < start + 130 * 60 * 1000;      // kickoff reached, not yet expired
  });
  setLiveDot(anyActive);
  if (anyActive && !pollHandle) {
    pollHandle = setInterval(fetchLiveData, 30000);
    fetchLiveData();
  } else if (!anyActive && pollHandle) {
    clearInterval(pollHandle);
    pollHandle = null;
  }
}

async function fetchLiveData() {
  try {
    const res = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260627&limit=200');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    consecutiveFailures = 0;
    setErrorBanner(false);
    const el = document.getElementById('last-updated');
    if (el) el.textContent = 'Last updated: ' + new Intl.DateTimeFormat(navigator.language, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }).format(new Date());

    for (const event of (data.events || [])) {
      const comp  = event.competitions[0];
      const state = comp.status.type.state;
      const homeC = comp.competitors.find(c => c.homeAway === 'home');
      const awayC = comp.competitors.find(c => c.homeAway === 'away');
      if (!homeC || !awayC) continue;
      const match = MATCHES.find(m =>
        m.home === mapEspnName(homeC.team.displayName) &&
        m.away === mapEspnName(awayC.team.displayName)
      );
      if (!match) continue;
      ESPN_EVENT_IDS[match.id] = event.id;
      ESPN_STATES[match.id] = state;
      // Sync kickoff to ESPN's authoritative date so all times stay correct
      const espnDate = event.date || comp.date;
      if (espnDate) {
        const d = new Date(espnDate);
        if (!isNaN(d)) match.kickoff = d;
      }
      if (state === 'in') {
        RESULTS[match.id]      = { hs: parseInt(homeC.score) || 0, as: parseInt(awayC.score) || 0 };
        CLOCKS[match.id]       = comp.status.type.shortDetail || null;
        STATUS_NAMES[match.id] = (comp.status.type.name || '') + ' ' + (comp.status.type.description || '');
        console.log('[live]', match.home, 'vs', match.away, '| shortDetail:', comp.status.type.shortDetail, '| name:', comp.status.type.name, '| desc:', comp.status.type.description, '| detail:', comp.status.type.detail, '| statusFull:', JSON.stringify(comp.status.type));
        parseScorersFromComp(match, comp, homeC, awayC);
      } else if (state === 'post') {
        RESULTS[match.id] = { hs: parseInt(homeC.score) || 0, as: parseInt(awayC.score) || 0 };
        delete CLOCKS[match.id];
        parseScorersFromComp(match, comp, homeC, awayC);
      } else {
        delete RESULTS[match.id];
        delete CLOCKS[match.id];
      }
    }

    recomputeStandings();
    renderMatchList();
    if (currentTab === 'brackets') renderBrackets();
    checkPolling();

    // Fallback: for any live/completed match still missing scorer data,
    // fetch the per-match summary endpoint (some games omit inline details).
    const scorerTargets = MATCHES.filter(m => {
      const s = ESPN_STATES[m.id];
      const need = (s === 'in') || (s === 'post' && !SCORER_DONE.has(m.id));
      return need && ESPN_EVENT_IDS[m.id] && !SCORERS[m.id];
    });
    if (scorerTargets.length) {
      await Promise.all(scorerTargets.map(fetchMatchScorers));
      renderMatchList();
    }
  } catch (e) {
    consecutiveFailures++;
    console.warn('ESPN fetch failed', e);
    if (consecutiveFailures >= 3) setErrorBanner(true);
  }
}

// Parse scorers from the scoreboard competition object (inline details).
// This uses data we already fetch successfully — no extra CORS-bound request.
function parseScorersFromComp(m, comp, homeC, awayC) {
  const details = comp.details;
  if (!Array.isArray(details) || !details.length) return; // leave for summary fallback
  const homeId = homeC.team?.id;
  const awayId = awayC.team?.id;
  const home = [], away = [];
  for (const d of details) {
    if (!d.scoringPlay) continue;
    const tid = d.team?.id;
    const side = tid === homeId ? home : tid === awayId ? away : null;
    if (!side) continue;
    const ath  = (d.athletesInvolved && d.athletesInvolved[0]) || null;
    const raw  = ath?.shortName || ath?.displayName || '';
    const name = raw.split(' ').pop();
    if (!name) continue;
    const rawMin = d.clock?.displayValue || '';
    const min = rawMin.includes(':') ? `${parseInt(rawMin)}'` : rawMin;
    side.push({ name, min });
  }
  if (home.length || away.length) {
    SCORERS[m.id] = { home, away };
    // Details update on ESPN before the aggregate score fields — sync score forward
    const cur = RESULTS[m.id] || { hs: 0, as: 0 };
    RESULTS[m.id] = { hs: Math.max(cur.hs, home.length), as: Math.max(cur.as, away.length) };
    if (ESPN_STATES[m.id] === 'post') SCORER_DONE.add(m.id);
  }
}

async function fetchMatchScorers(m) {
  const eventId = ESPN_EVENT_IDS[m.id];
  if (!eventId) return;
  try {
    const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=${eventId}`);
    if (!res.ok) return;
    const data = await res.json();

    // Resolve team IDs from the summary header so we match by ID, not name
    const comp       = data.header?.competitions?.[0];
    const homeTeamId = comp?.competitors?.find(c => c.homeAway === 'home')?.team?.id;
    const awayTeamId = comp?.competitors?.find(c => c.homeAway === 'away')?.team?.id;

    // Some ESPN endpoints use 'scoringPlays'; others put scored plays inside 'plays'
    const plays = data.scoringPlays?.length
      ? data.scoringPlays
      : (data.plays?.filter(p => p.scoringPlay) ?? []);

    if (plays.length) console.log('[scorers] sample play', m.id, plays[0]);

    const home = [], away = [];
    for (const play of plays) {
      const tid  = play.team?.id;
      const tnam = mapEspnName(play.team?.displayName || '');
      // Match by ID when available, fall back to display-name mapping
      const isHome = (homeTeamId && tid === homeTeamId) || (!homeTeamId && tnam === m.home);
      const isAway = (awayTeamId && tid === awayTeamId) || (!awayTeamId && tnam === m.away);
      const side = isHome ? home : isAway ? away : null;
      if (!side) continue;

      // Athlete may be in participants array or directly on the play
      const scorer     = play.participants?.find(p => p.type === 'scorer') || play.participants?.[0];
      const athleteObj = scorer?.athlete ?? play.athlete;
      const raw  = athleteObj?.shortName || athleteObj?.displayName || '';
      const name = raw.split(' ').pop();

      // Normalise clock: "23:00" → "23'"; "23'" stays as-is
      const rawMin = play.clock?.displayValue || '';
      const min = rawMin.includes(':') ? `${parseInt(rawMin)}'` : rawMin;

      if (name) side.push({ name, min });
    }
    SCORERS[m.id] = { home, away };
    if (ESPN_STATES[m.id] === 'post') SCORER_DONE.add(m.id);
  } catch (e) {
    console.warn('Scorer fetch failed', m.id, e);
  }
}

function formatScorerSide(list) {
  if (!list?.length) return '';
  const grouped = {};
  for (const { name, min } of list) {
    if (!grouped[name]) grouped[name] = [];
    grouped[name].push(min);
  }
  return Object.entries(grouped)
    .map(([name, mins]) => `${name} ${mins.join(', ')}`)
    .join('<br>');
}

function matchStatus(m) {
  const espn = ESPN_STATES[m.id];
  if (espn === 'post') return 'completed';
  if (espn === 'in')   return 'live';
  if (espn === 'pre')  return 'upcoming';
  // Pre-fetch fallback: use time for upcoming/completed only — never guess live
  const now   = Date.now();
  const start = m.kickoff.getTime();
  if (now < start) return 'upcoming';
  const end = start + 130 * 60 * 1000;
  return now >= end ? 'completed' : 'upcoming';
}

function countdownText(m) {
  const espnState = ESPN_STATES[m.id];
  const now   = Date.now();
  const start = m.kickoff.getTime();

  // Use ESPN state as authoritative source when available
  if (espnState === 'in') {
    const clock = CLOCKS[m.id]; // shortDetail e.g. "45'", "HT", "90'+3'"
    let display;
    if (clock) {
      // Match ESPN stoppage format e.g. "90'+6'" \u2192 show running total e.g. "96'"
      const stoppage = clock.match(/^(\d+)['+\u2019\u2032]?\s*\+\s*(\d+)['+\u2019\u2032]?$/);
      if (stoppage) {
        const running = parseInt(stoppage[1]) + parseInt(stoppage[2]);
        display = `${running}'`;
      } else {
        display = clock;
      }
    } else {
      display = `${Math.floor((now - start) / 60000)}'`;
    }
    return { text: `LIVE · ${display}`, cls: 'live' };
  }
  if (espnState === 'post') return { text: 'Full time', cls: 'done' };

  // Pre-fetch / pre-game fallback
  if (now < start) {
    const diff = start - now;
    const days = Math.floor(diff / 86400000);
    const hrs  = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    let text, cls = '';
    if (days > 0) {
      text = `in ${days}d ${hrs}h`;
    } else if (hrs > 0) {
      text = `in ${hrs}h ${mins}m`;
      if (hrs < 1) cls = 'soon';
    } else {
      text = `in ${mins}m`;
      cls = 'soon';
    }
    return { text, cls };
  }

  // ESPN not yet confirmed — never guess live
  return { text: 'Waiting for kick-off', cls: 'soon' };
}

function filterMatches() {
  return MATCHES.filter(m => {
    if (currentTeamFilter) {
      if (m.home !== currentTeamFilter && m.away !== currentTeamFilter) return false;
      if (groupFixtureFilter === 'upcoming') return matchStatus(m) !== 'completed';
      if (groupFixtureFilter === 'past') return matchStatus(m) === 'completed';
      return true;
    }
    if (currentGroup === 'UPCOMING') return matchStatus(m) !== 'completed';
    if (currentGroup === 'PAST') return matchStatus(m) === 'completed';
    if (currentGroup === 'ALL' || currentGroup === 'ALL_GROUPS') return true;
    if (m.group !== currentGroup) return false;
    if (groupFixtureFilter === 'upcoming') return matchStatus(m) !== 'completed';
    if (groupFixtureFilter === 'past') return matchStatus(m) === 'completed';
    return true;
  });
}

function renderBracketChips() {
  const wrap = document.getElementById('group-chips');
  const allMatches = BRACKET_ROUNDS.flatMap(r => r.matches);
  const hasPast = allMatches.some(m => m.date && new Date(m.date) < Date.now());
  wrap.style.display = 'flex';

  const filterChips = (bracketView === 'list' && hasPast) ? `
    <div class="chip ${bracketFilter === 'upcoming' ? 'active' : ''}" data-bf="upcoming">Upcoming</div>
    <div class="chip ${bracketFilter === 'past' ? 'active' : ''}" data-bf="past">Past</div>` : '';

  wrap.innerHTML = `
    <div class="chip ${bracketView === 'list' ? 'active' : ''}" data-bv="list">List</div>
    <div class="chip ${bracketView === 'columns' ? 'active' : ''}" data-bv="columns">Columns</div>
    <div class="chip ${bracketView === 'tree' ? 'active' : ''}" data-bv="tree">Tree</div>
    ${filterChips}`;

  wrap.querySelectorAll('[data-bf]').forEach(el =>
    el.addEventListener('click', () => {
      if (el.dataset.bf === bracketFilter) return;
      bracketFilter = el.dataset.bf;
      renderBracketChips();
      renderBrackets();
    })
  );
  wrap.querySelectorAll('[data-bv]').forEach(el =>
    el.addEventListener('click', () => {
      if (el.dataset.bv === bracketView) return;
      bracketView = el.dataset.bv;
      renderBracketChips();
      renderBrackets();
    })
  );
}

function renderTeamChips() {
  const wrap = document.getElementById('team-chips');
  wrap.style.display = 'flex';

  const pool = Object.entries(TEAMS).sort((a, b) => a[0].localeCompare(b[0]));
  wrap.innerHTML = pool.map(([name, t]) =>
    `<div class="chip ${currentTeamFilter === name ? 'active' : ''}" data-team="${name}">${t.flag} ${name}</div>`
  ).join('');

  wrap.querySelectorAll('.chip[data-team]').forEach(el =>
    el.addEventListener('click', () => {
      const name = el.dataset.team;
      if (currentTeamFilter === name) {
        currentTeamFilter = null;
        currentGroup = 'UPCOMING';
        groupFixtureFilter = 'upcoming';
        renderChips();
      } else {
        currentTeamFilter = name;
        currentGroup = 'ALL';
        groupFixtureFilter = 'upcoming';
        renderChips();
      }
      renderTeamChips();
      renderMatchList();
    })
  );
}


function renderChips() {
  const wrap = document.getElementById('group-chips');
  wrap.style.display = 'flex';
  const groups = ['A','B','C','D','E','F','G','H','I','J','K','L'];
  wrap.innerHTML = `
    <div class="chip upcoming-chip ${currentGroup === 'UPCOMING' ? 'active-green' : ''}" data-group="UPCOMING">Upcoming</div>
    <div class="chip past-chip ${currentGroup === 'PAST' ? 'active-past' : ''}" data-group="PAST">Past</div>
    <div class="chip ${currentGroup === 'ALL_GROUPS' ? 'active' : ''}" data-group="ALL_GROUPS">All Groups</div>
    ${groups.map(g => `
      <div class="chip ${g === currentGroup ? 'active' : ''}" data-group="${g}">Group ${g}</div>
    `).join('')}`;
  wrap.querySelectorAll('.chip').forEach(el =>
    el.addEventListener('click', () => {
      if (el.dataset.group === currentGroup) return;
      currentGroup = el.dataset.group;
      currentTeamFilter = null;
      groupFixtureFilter = 'upcoming';
      renderChips();
      renderTeamChips();
      renderMatchList();
    })
  );
}

  const groupTeams = liveStandings
    ? liveStandings.map(s => ({ ...s, flag: TEAMS[s.name]?.flag || '🏳️' }))
    : Object.entries(TEAMS)
        .filter(([, t]) => t.group === g)
        .map(([name, t]) => ({ name, flag: t.flag, ranking: t.ranking, p:0,w:0,d:0,l:0,gd:0,pts:0 }))
        .sort((a, b) => a.ranking - b.ranking);

    <div class="standings-wrap">
      <div class="standings-label standings-label-link" data-grp="${g}">Group ${g}</div>

                <td>${t.gd > 0 ? '+' + t.gd : t.gd}</td><td class="td-pts">${t.pts}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

function liveBreakLabel(clock, statusName) {
  const hay = (clock || '') + ' ' + (statusName || '');
  if (!hay.trim()) return null;
  if (/water|cooling|hydration|drink|break/i.test(hay)) return '💧 Water Break';
  if (/^HT\b|half.?time|HALFTIME/i.test(hay))           return '⏸ Half Time';
  if (/ET\s*HT|extra.?time.?half/i.test(hay))           return '⏸ Extra Time HT';
  if (/penalt/i.test(hay))                               return '🎯 Penalty Shootout';
  return null;
}

function downloadICS(m) {
  const pad = n => String(n).padStart(2, '0');
  const fmtUTC = d => `${d.getUTCFullYear()}${pad(d.getUTCMonth()+1)}${pad(d.getUTCDate())}T${pad(d.getUTCHours())}${pad(d.getUTCMinutes())}00Z`;
  const end = new Date(m.kickoff.getTime() + 120 * 60 * 1000);
  const ics = [
    'BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//WC 2026 Tracker//EN',
    'BEGIN:VEVENT',
    `DTSTART:${fmtUTC(m.kickoff)}`, `DTEND:${fmtUTC(end)}`,
    `SUMMARY:${m.home} vs ${m.away} – Group ${m.group}`,
    `LOCATION:${m.venue}, ${m.city}`, 'DESCRIPTION:FIFA World Cup 2026',
    `UID:${m.id}@wc2026tracker`,
    'END:VEVENT', 'END:VCALENDAR'
  ].join('\r\n');
  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `wc2026-${m.id}.ics`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function cardHtml(m) {
  const { text, cls } = countdownText(m);
  const isLive = cls === 'live';
  const result = RESULTS[m.id];
  const isDone = matchStatus(m) === 'completed';
  const clock = CLOCKS[m.id] || '';
  const breakLabel = isLive ? liveBreakLabel(clock, STATUS_NAMES[m.id]) : null;
  const scorerData  = (isLive || isDone) ? SCORERS[m.id] : null;
  const homeScorers = formatScorerSide(scorerData?.home);
  const awayScorers = formatScorerSide(scorerData?.away);
  return `
    <div class="match-card" data-id="${m.id}" data-home="${m.home}" data-away="${m.away}">
      <div class="card-top">
        <span class="card-group" data-group="${m.group}">Group ${m.group}</span>
        <span class="card-time ${isLive ? 'live' : isDone ? 'done' : ''}">${isLive ? `<span class="live-dot"></span>${text}` : isDone ? 'FT' : fmtTime.format(m.kickoff)}</span>
      </div>
      ${breakLabel ? `<div class="card-break">${breakLabel}</div>` : ''}
      <div class="card-teams">
        <div class="ct-home">
          <span class="ct-flag">${teamFlag(m.home)}</span>
          <span class="ct-name">${m.home}</span>
        </div>
        <span class="ct-vs${isLive ? ' live' : isDone ? ' done' : ''}">${(isDone || isLive) ? `${result?.hs ?? 0} – ${result?.as ?? 0}` : 'vs'}</span>
        <div class="ct-away">
          <span class="ct-name">${m.away}</span>
          <span class="ct-flag">${teamFlag(m.away)}</span>
        </div>
      </div>
      ${(homeScorers || awayScorers) ? `
      <div class="card-scorers">
        <div class="card-scorers-home">${homeScorers}</div>
        <div class="card-scorers-away">${awayScorers}</div>
      </div>` : ''}
      <div class="card-bottom">
        <span class="card-venue">${groupVenueLabel(m.city, m.venue)}</span>
        <span class="card-bottom-right">
          <span class="card-cd ${isDone ? 'done' : cls}" data-id="${isDone ? '' : m.id}">${isDone ? '' : isLive ? '' : text}</span>${!isLive && !isDone ? `<span class="card-cal-btn" data-cal-id="${m.id}">📅 Add</span>` : ''}
        </span>
      </div>
    </div>`;
}

// ─── RENDER MATCH LIST ───────────────────────────────────────────────────────
function renderMatchList() {
  const list = document.getElementById('match-list');
  if (currentTab === 'brackets') {
    list.innerHTML = '<div class="empty-state">Bracket available after group stage</div>';
    return;
  }

  if (currentGroup === 'ALL_GROUPS') {
    const bestThird = computeBestThirdSet();
    list.innerHTML = ['A','B','C','D','E','F','G','H','I','J','K','L'].map(g => standingsTableHtml(g, bestThird)).join('');
    list.querySelectorAll('.standings-label-link[data-grp]').forEach(el => {
      el.addEventListener('click', () => {
        currentGroup = el.dataset.grp;
        currentTeamFilter = null;
        groupFixtureFilter = 'upcoming';
        renderChips();
        renderTeamChips();
        renderMatchList();
      });
    });
    return;
  }

  // Compute activeGroup early so we can adjust groupFixtureFilter before filtering
  const activeGroup = currentTeamFilter ? TEAMS[currentTeamFilter]?.group : (['ALL','UPCOMING','PAST','ALL_GROUPS'].includes(currentGroup) ? null : currentGroup);

  let hasPast = false, hasUpcoming = false;
  if (activeGroup) {
    const ctx = MATCHES.filter(m => currentTeamFilter ? (m.home === currentTeamFilter || m.away === currentTeamFilter) : m.group === activeGroup);
    hasPast = ctx.some(m => matchStatus(m) === 'completed');
    hasUpcoming = ctx.some(m => matchStatus(m) !== 'completed');
    if (hasPast && !hasUpcoming) groupFixtureFilter = 'past';
  }

  const filtered = filterMatches();

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">No matches found</div>';
    return;
  }

  filtered.sort((a, b) => a.kickoff - b.kickoff);

  const live = filtered.filter(m => matchStatus(m) === 'live');
  const rest = filtered.filter(m => matchStatus(m) !== 'live');

  let html = '';

  if (activeGroup) {
    html += standingsTableHtml(activeGroup, computeBestThirdSet());
    if (hasPast && hasUpcoming) {
      html += `<div class="group-fixture-chips">
        <div class="chip ${groupFixtureFilter === 'upcoming' ? 'active' : ''}" data-gff="upcoming">Upcoming</div>
        <div class="chip ${groupFixtureFilter === 'past' ? 'active' : ''}" data-gff="past">Past</div>
      </div>`;
    }
  }

  function renderByDate(matches) {
    const byDate = {};
    matches.forEach(m => {
      const key = localDateKey(m.kickoff);
      if (!byDate[key]) byDate[key] = [];
      byDate[key].push(m);
    });
    const sortedKeys = Object.keys(byDate).sort();
    const isPastView = currentGroup === 'PAST' || (activeGroup && groupFixtureFilter === 'past');
    if (isPastView) sortedKeys.reverse();
    sortedKeys.forEach(key => {
      if (isPastView) byDate[key].reverse();
      html += `<div class="date-header">${fmtDayHeader.format(new Date(key + 'T12:00:00'))}</div>`;
      byDate[key].forEach(m => { html += cardHtml(m); });
    });
  }

  renderByDate([...live, ...rest]);

  list.innerHTML = html;

  list.querySelectorAll('.standings-label-link[data-grp]').forEach(el => {
    el.addEventListener('click', () => {
      currentGroup = el.dataset.grp;
      currentTeamFilter = null;
      groupFixtureFilter = 'upcoming';
      renderChips();
      renderTeamChips();
      renderMatchList();
      window.scrollTo({ top: 0, behavior: 'instant' });
      const chip = document.querySelector(`#group-chips .chip[data-group="${currentGroup}"]`);
      if (chip) chip.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'instant' });
    });
  });

  list.querySelectorAll('[data-gff]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      if (el.dataset.gff === groupFixtureFilter) return;
      groupFixtureFilter = el.dataset.gff;
      renderMatchList();
    });
  });

  list.querySelectorAll('.card-group[data-group]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      currentGroup = el.dataset.group;
      currentTeamFilter = null;
      groupFixtureFilter = 'upcoming';
      renderChips();
      renderTeamChips();
      renderMatchList();
      window.scrollTo({ top: 0, behavior: 'instant' });
      const chip = document.querySelector(`#group-chips .chip[data-group="${currentGroup}"]`);
      if (chip) chip.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'instant' });
    });
  });

  list.querySelectorAll('.card-cal-btn[data-cal-id]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const m = MATCHES.find(x => x.id === el.dataset.calId);
      if (m) downloadICS(m);
    });
  });

  list.querySelectorAll('.match-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.card-venue') || e.target.closest('.card-group') || e.target.closest('[data-gff]') || e.target.closest('.card-cal-btn')) return;
      const clickX = e.clientX;
      const rect = card.getBoundingClientRect();
      const relX = clickX - rect.left;
      const teamName = relX < rect.width / 2 ? card.dataset.home : card.dataset.away;
      selectTeam(teamName);
    });
  });

  list.querySelectorAll('.card-venue').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const card = el.closest('.match-card');
      const m = MATCHES.find(x => x.id === card?.dataset.id);
      if (!m) return;
      prevState = { tab: currentTab, group: currentGroup, teamFilter: currentTeamFilter };
      currentStadium = m.venue;
      renderStadiums();
    });
  });
}

// ─── LIVE TIMER ──────────────────────────────────────────────────────────────
let _tick = 0;
function tickCountdowns() {
  let needsRender = false;
  document.querySelectorAll('.card-cd[data-id]').forEach(el => {
    const id = el.dataset.id;
    if (!id) return;
    const m = MATCHES.find(x => x.id === id);
    if (!m) return;
    const { text, cls } = countdownText(m);
    const isLive = cls === 'live';
    el.textContent = isLive ? '' : text;
    el.className = 'card-cd' + (cls ? ' ' + cls : '');
    // Update time chip for non-live games; for live games the chip updates
    // via renderMatchList on each ESPN fetch. If a card transitions from
    // live → done, schedule a full re-render to clear it from the view.
    if (!isLive) {
      const card = el.closest('.match-card');
      if (card) {
        const timeEl = card.querySelector('.card-time');
        if (timeEl) {
          if (timeEl.classList.contains('live')) {
            needsRender = true; // game just ended — re-render to remove/update card
          } else {
            timeEl.textContent = fmtTime.format(m.kickoff);
            timeEl.className = 'card-time';
          }
        }
      }
    }
  });
  if (needsRender) { renderMatchList(); return; }
  // Check every 30s whether a new game has gone live (starts polling if so)
  if (++_tick % 30 === 0) checkPolling();
  document.querySelectorAll('.fx-cd[data-id]').forEach(el => {
    const m = MATCHES.find(x => x.id === el.dataset.id);
    if (!m) return;
    const { text, cls } = countdownText(m);
    el.textContent = text;
    el.className = 'fx-cd' + (cls ? ' ' + cls : '');
  });
}

// ─── SELECT TEAM ─────────────────────────────────────────────────────────────
function selectTeam(name) {
  if (!TEAMS[name]) return;
  currentTeamFilter = name;
  currentGroup = 'ALL';
  groupFixtureFilter = 'upcoming';
  currentTab = 'group-phase';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab[data-tab="group-phase"]').classList.add('active');
  renderChips();
  renderTeamChips();
  renderMatchList();
  // scroll team pill into view
  const pill = document.querySelector(`#team-chips .chip[data-team="${name}"]`);
  if (pill) pill.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
}

// Maps each R16+ match to the two predecessor match IDs that feed its slots
const BRACKET_PREDECESSORS = {
  'r16-1': ['r32-1',  'r32-2'],
  'r16-2': ['r32-3',  'r32-4'],
  'r16-3': ['r32-5',  'r32-6'],
  'r16-4': ['r32-7',  'r32-8'],
  'r16-5': ['r32-9',  'r32-10'],
  'r16-6': ['r32-11', 'r32-12'],
  'r16-7': ['r32-13', 'r32-14'],
  'r16-8': ['r32-15', 'r32-16'],
  'qf-1':  ['r16-1',  'r16-2'],
  'qf-2':  ['r16-3',  'r16-4'],
  'qf-3':  ['r16-5',  'r16-6'],
  'qf-4':  ['r16-7',  'r16-8'],
  'sf-1':  ['qf-1',   'qf-2'],
  'sf-2':  ['qf-3',   'qf-4'],
  'fin-1': ['sf-1',   'sf-2'],
};

// Returns all projected team names that could come out of a given match
function getMatchCandidatesAll(matchId) {
  const preds = BRACKET_PREDECESSORS[matchId];
  if (!preds) {
    const match = BRACKET_ROUNDS.flatMap(r => r.matches).find(m => m.id === matchId);
    if (!match) return [];
    const out = [];
    const t1 = match.team1 || getConfirmedTeam(match.label1) || getProjectedTeam(match.label1);
    if (t1) out.push(t1);
    const t2 = match.team2 || getConfirmedTeam(match.label2) || getProjectedTeam(match.label2);
    if (t2) out.push(t2);
    return out;
  }
  return preds.flatMap(id => getMatchCandidatesAll(id));
}

// Returns candidate teams for one slot (home/away) of an R16+ match; null for R32
function getSlotCandidates(matchId, side) {
  const preds = BRACKET_PREDECESSORS[matchId];
  if (!preds) return null;
  return getMatchCandidatesAll(side === 'home' ? preds[0] : preds[1]);
}

// ─── VENUE HELPERS ───────────────────────────────────────────────────────────
// Normalise state/province/country abbreviations
function venueSuffix(raw) {
  if (!raw) return '';
  if (raw === 'Mexico') return 'MX';
  if (raw === 'ON' || raw === 'BC') return 'CAN';
  return raw; // US state code as-is
}
// Group match cities that need a country suffix
const CITY_SUFFIX = {
  'Mexico City': 'MX', 'Zapopan': 'MX', 'Guadalupe': 'MX',
  'Toronto': 'CAN', 'Vancouver': 'CAN',
};
// Bracket venues: "Stadium, City, ST" → "City, XX"
function bracketVenueCity(venue) {
  if (!venue) return '';
  const p = venue.split(',').map(s => s.trim());
  if (p.length < 2) return '';
  return `${p[1]}, ${venueSuffix(p[2])}`;
}
// For bracket list cards: "City, XX · Stadium"
function bracketVenueFull(venue) {
  if (!venue) return 'TBD';
  const p = venue.split(',').map(s => s.trim());
  if (p.length < 3) return venue;
  return `${p[1]}, ${venueSuffix(p[2])} · ${p[0]}`;
}
// For group match cards: "City[, XX] · Stadium"
function groupVenueLabel(city, stadium) {
  const sfx = CITY_SUFFIX[city];
  return sfx ? `${city}, ${sfx} · ${stadium}` : `${city} · ${stadium}`;
}

// ─── BRACKET CARD HELPERS (shared by brackets and stadium view) ──────────────
function groupFromLabel(label) {
  const m = label && label.match(/Group ([A-L])/);
  return m ? m[1] : null;
}

// Returns H2H result for teamA vs teamB from RESULTS: 'win'|'draw'|'loss'|null (not played)
function getH2HResult(teamA, teamB) {
  const match = MATCHES.find(m =>
    (m.home === teamA && m.away === teamB) || (m.home === teamB && m.away === teamA)
  );
  if (!match) return null;
  const r = RESULTS[match.id];
  if (!r) return null;
  const scoreA = match.home === teamA ? r.hs : r.as;
  const scoreB = match.home === teamA ? r.as : r.hs;
  return scoreA > scoreB ? 'win' : scoreA < scoreB ? 'loss' : 'draw';
}

// Returns true when a group position is mathematically confirmed using FIFA 2026 rules:
// H2H is the first tiebreaker when teams are level on points.
// Position P is confirmed only when:
//   1. Fewer than P rivals can possibly finish above this team (guaranteed top-P)
//   2. At least P-1 rivals are guaranteed to finish above (team can't rise higher than P)
function isPositionConfirmed(pos, grp) {
  const rows = STANDINGS[grp];
  if (!rows || rows.length < 4) return false;
  if (rows.every(t => t.p === 3)) return true; // group fully played — position locked by sort
  const team = rows[pos - 1];
  if (!team) return false;

  const teamMaxPts = team.pts + 3 * (3 - team.p);
  let canFinishAbove = 0;
  let guaranteedAbove = 0;

  for (const rival of rows.filter((_, i) => i !== pos - 1)) {
    const maxRivalPts = rival.pts + 3 * (3 - rival.p);

    // Can rival finish above this team?
    if (maxRivalPts > team.pts) {
      canFinishAbove++;
    } else if (maxRivalPts === team.pts) {
      if (getH2HResult(team.name, rival.name) !== 'win') canFinishAbove++;
    }
    if (canFinishAbove >= pos) return false;

    // Is rival guaranteed to finish above this team even in the best case?
    // (rival's current pts alone beat team's max possible pts)
    if (rival.pts > teamMaxPts) {
      guaranteedAbove++;
    } else if (rival.pts === teamMaxPts) {
      if (getH2HResult(rival.name, team.name) === 'win') guaranteedAbove++;
    }
  }

  // For position P > 1: at least P-1 teams must be locked above (team can't rise to P-1 or better)
  if (pos > 1 && guaranteedAbove < pos - 1) return false;

  return true;
}

// Returns the confirmed team for a label like "1st Group E", or null if not yet locked in
function getConfirmedTeam(label) {
  const m = label && label.match(/^(\d+)(?:st|nd|rd|th) Group ([A-L])$/);
  if (!m) return null;
  const pos = parseInt(m[1], 10);
  const grp = m[2];
  const rows = STANDINGS[grp];
  if (!rows || rows.length < pos) return null;
  if (!isPositionConfirmed(pos, grp)) return null;
  return rows[pos - 1].name;
}

function getProjectedTeam(label) {
  const m = label && label.match(/^(\d+)(?:st|nd|rd|th) Group ([A-L])$/);
  if (m) {
    const pos = parseInt(m[1], 10);
    const grp = m[2];
    const standings = STANDINGS[grp];
    if (standings && standings.length >= pos) return standings[pos - 1].name;
    const ranked = Object.entries(TEAMS)
      .filter(([, t]) => t.group === grp)
      .sort((a, b) => a[1].ranking - b[1].ranking);
    return ranked[pos - 1]?.[0] || null;
  }
  const m3 = label && label.match(/^3rd Best #(\d+)$/);
  if (m3) {
    const rank = parseInt(m3[1], 10);
    const thirds = 'ABCDEFGHIJKL'.split('').map(grp => {
      const st = STANDINGS[grp];
      if (st && st.length >= 3) return { name: st[2].name, pts: st[2].pts, gd: st[2].gd, gf: st[2].gf, ranking: TEAMS[st[2].name]?.ranking || 999 };
      const ranked = Object.entries(TEAMS)
        .filter(([, t]) => t.group === grp)
        .sort((a, b) => a[1].ranking - b[1].ranking);
      const name = ranked[2]?.[0];
      return name ? { name, pts: 0, gd: 0, gf: 0, ranking: TEAMS[name]?.ranking || 999 } : null;
    }).filter(Boolean).sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.ranking - b.ranking);
    return thirds[rank - 1]?.name || null;
  }
  return null;
}

function currentLeaderFlag(label) {
  const name = getProjectedTeam(label);
  return (name && TEAMS[name]?.flag) || '\u{1F3F3}\uFE0F';
}

function slotHtml(team, label, side, candidates) {
  const known = team && TEAMS[team];
  if (known) {
    return side === 'home'
      ? `<span class="ct-flag">${TEAMS[team].flag}</span><span class="ct-name">${team}</span>`
      : `<span class="ct-name">${team}</span><span class="ct-flag">${TEAMS[team].flag}</span>`;
  }
  // R16+ TBD slots: >8 candidates → white flag + TBD; 8 → flags only; ≤4 → flags + TBD
  if (candidates && candidates.length > 0) {
    const flagSpan = candidates.length > 8
      ? `<span class="ct-flag">\u{1F3F3}️</span>`
      : `<span class="ct-flag">${candidates.map(n => TEAMS[n]?.flag || '').filter(Boolean).join('')}</span>`;
    const labelSpan = candidates.length !== 8 ? `<span class="ct-name-tbd">TBD</span>` : '';
    return side === 'home' ? `${flagSpan}${labelSpan}` : `${labelSpan}${flagSpan}`;
  }
  // R32 slots: single projected flag + label
  const grp = groupFromLabel(label);
  const projected = getProjectedTeam(label);
  const flag = (projected && TEAMS[projected]?.flag) || '\u{1F3F3}\uFE0F';
  const tappable = !!grp;
  return side === 'home'
    ? `<span class="ct-flag">${flag}</span><span class="ct-name-tbd ${tappable ? 'grp-link' : ''}" data-grp="${grp || ''}">${label}</span>`
    : `<span class="ct-name-tbd ${tappable ? 'grp-link' : ''}" data-grp="${grp || ''}">${label}</span><span class="ct-flag">${flag}</span>`;
}

function bracketCardHtml(m) {
  const team1 = m.team1 || getConfirmedTeam(m.label1);
  const team2 = m.team2 || getConfirmedTeam(m.label2);
  const kickoff = m.date ? new Date(m.date) : null;
  const timeStr = kickoff ? fmtTime.format(kickoff) : 'TBD';
  const cands1 = !team1 ? getSlotCandidates(m.id, 'home') : null;
  const cands2 = !team2 ? getSlotCandidates(m.id, 'away') : null;
  return `
    <div class="match-card" data-bteam1="${team1 || ''}" data-bteam2="${team2 || ''}" data-venue="${m.venue || ''}">
      <div class="card-top">
        <span class="card-group">${m.round}</span>
        <span class="card-time">${timeStr}</span>
      </div>
      <div class="card-teams">
        <div class="ct-home">${slotHtml(team1, m.label1, 'home', cands1)}</div>
        <span class="ct-vs">vs</span>
        <div class="ct-away">${slotHtml(team2, m.label2, 'away', cands2)}</div>
      </div>
      <div class="card-bottom">
        <span class="card-venue">${bracketVenueFull(m.venue)}</span>
        <span class="card-bottom-right">
          <span class="card-cd">${kickoff ? 'in ' + Math.ceil((kickoff - Date.now()) / 86400000) + 'd' : ''}</span>
          ${team1 && team2 && kickoff && kickoff > Date.now() ? `<span class="card-cal-btn" data-bcal-id="${m.id}">📅 Add</span>` : ''}
        </span>
      </div>
    </div>`;
}

// Compact vertical card for the tree view — teams stacked top/bottom
function bracketCardTreeHtml(m) {
  const team1   = m.team1 || getConfirmedTeam(m.label1);
  const team2   = m.team2 || getConfirmedTeam(m.label2);
  const kickoff = m.date ? new Date(m.date) : null;
  const dateStr = kickoff ? fmtDate.format(kickoff) : 'TBD';
  const timeStr = kickoff ? fmtTime.format(kickoff) : '';
  const daysLeft = kickoff ? Math.ceil((kickoff - Date.now()) / 86400000) : null;
  const result  = RESULTS[m.id];
  const score1  = result != null ? result.hs : null;
  const score2  = result != null ? result.as : null;

  const slotRow = (team, label, isHome, score) => {
    if (team) {
      return `<div class="btcard-team">
        <span class="btcard-flag">${TEAMS[team]?.flag || ''}</span>
        <span class="btcard-name">${team}</span>
        ${score !== null ? `<span class="btcard-score">${score}</span>` : ''}
      </div>`;
    }
    // TBD — show projected flag or candidate flags (same thresholds as list view)
    const proj = getProjectedTeam(label);
    let flagHtml = '';
    let showLabel = true;
    if (proj && TEAMS[proj]) {
      flagHtml = `<span class="btcard-flag btcard-flag-proj">${TEAMS[proj].flag}</span>`;
    } else {
      const allCands = getSlotCandidates(m.id, isHome ? 'home' : 'away') || [];
      const cands = allCands.slice(0, 8);
      if (cands.length > 4) {
        showLabel = false;
        const row1 = cands.slice(0, 4).map(t => TEAMS[t]?.flag || '').join('');
        const row2 = cands.slice(4).map(t => TEAMS[t]?.flag || '').join('');
        flagHtml = `<span class="btcard-cand-flags btcard-cand-flags-2row"><span>${row1}</span><span>${row2}</span></span>`;
      } else if (cands.length > 0) {
        flagHtml = `<span class="btcard-cand-flags">${cands.map(t => TEAMS[t]?.flag || '').join('')}</span>`;
      }
    }
    return `<div class="btcard-team btcard-team-tbd">
      ${flagHtml}
      ${showLabel ? `<span class="btcard-tbd-label">${label || 'TBD'}</span>` : ''}
    </div>`;
  };

  const calBtn = team1 && team2 && kickoff && kickoff > Date.now()
    ? `<span class="card-cal-btn btcard-cal" data-bcal-id="${m.id}">📅</span>` : '';
  const cdHtml = daysLeft !== null && daysLeft > 0
    ? `<span class="btcard-cd">in ${daysLeft}d</span>` : '';

  return `
    <div class="match-card btcard" data-bteam1="${team1 || ''}" data-bteam2="${team2 || ''}" data-venue="${m.venue || ''}">
      <div class="btcard-top">
        <span class="btcard-date">${dateStr}</span>
        <span class="btcard-time">${timeStr}</span>
      </div>
      ${slotRow(team1, m.label1, true, score1)}
      <div class="btcard-vs">vs</div>
      ${slotRow(team2, m.label2, false, score2)}
      <div class="btcard-bottom">
        <span class="btcard-venue">${bracketVenueCity(m.venue) || 'TBD'}</span>
        <span class="btcard-bottom-right">${cdHtml}${calBtn}</span>
      </div>
    </div>`;
}

// ─── RENDER BRACKETS ─────────────────────────────────────────────────────────
function renderBrackets() {
  if (bracketView === 'columns') renderBracketColumns();
  else if (bracketView === 'tree') renderBracketTree();
  else renderBracketList();
}

function attachBracketCardListeners(container) {
  container.querySelectorAll('.grp-link').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const grp = el.dataset.grp;
      if (!grp) return;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector('.tab[data-tab="group-phase"]').classList.add('active');
      currentTab = 'group-phase';
      currentGroup = grp;
      groupFixtureFilter = 'upcoming';
      renderChips();
      renderMatchList();
    });
  });

  container.querySelectorAll('.match-card[data-bteam1]').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.card-venue') || e.target.closest('.card-cal-btn')) return;
      const rect = card.getBoundingClientRect();
      // Tree cards: teams are stacked vertically — use Y midpoint
      // List cards: teams are side-by-side — use X midpoint
      const t = card.classList.contains('btcard')
        ? (e.clientY < rect.top + rect.height / 2 ? card.dataset.bteam1 : card.dataset.bteam2)
        : (e.clientX < rect.left + rect.width / 2 ? card.dataset.bteam1 : card.dataset.bteam2);
      if (t && TEAMS[t]) selectTeam(t);
    });
  });

  container.querySelectorAll('.card-cal-btn[data-bcal-id]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const roundEntry = BRACKET_ROUNDS.find(r => r.matches.some(x => x.id === el.dataset.bcalId));
      const bm = roundEntry?.matches.find(x => x.id === el.dataset.bcalId);
      if (!bm || !bm.date) return;
      const t1 = bm.team1 || getConfirmedTeam(bm.label1);
      const t2 = bm.team2 || getConfirmedTeam(bm.label2);
      if (t1 && t2) downloadBracketICS({ ...bm, round: roundEntry.label }, t1, t2);
    });
  });

  container.querySelectorAll('.card-venue').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const venue = el.closest('.match-card')?.dataset.venue;
      if (!venue) return;
      const venueName = venue.split(',')[0].trim();
      if (!venueName) return;
      prevState = { tab: currentTab, group: currentGroup, teamFilter: currentTeamFilter };
      currentStadium = venueName;
      renderStadiums();
    });
  });
}

function renderBracketList() {
  const list = document.getElementById('match-list');
  list.style.padding = '';

  const fmtDayHeader = new Intl.DateTimeFormat(navigator.language, { weekday:'long', month:'long', day:'numeric', timeZone: LOCAL_TZ });
  let html = '';

  BRACKET_ROUNDS.forEach(({ label, matches }) => {
    const filtered = matches.map(m => ({ ...m, round: label })).filter(m => {
      const isPast = m.date && new Date(m.date) < Date.now();
      return bracketFilter === 'past' ? isPast : !isPast;
    });
    if (!filtered.length) return;

    html += `<div class="round-header">${label}</div>`;

    const byDate = {};
    filtered.forEach(m => {
      const key = m.date ? new Intl.DateTimeFormat('en-CA', { timeZone: LOCAL_TZ }).format(new Date(m.date)) : 'tbd';
      if (!byDate[key]) byDate[key] = [];
      byDate[key].push(m);
    });

    Object.keys(byDate).sort().forEach(key => {
      const dateLabel = key === 'tbd' ? 'Date TBD' : fmtDayHeader.format(new Date(key + 'T12:00:00'));
      html += `<div class="date-header">${dateLabel}</div>`;
      byDate[key].forEach(m => { html += bracketCardHtml(m); });
    });
  });

  list.innerHTML = html;
  attachBracketCardListeners(list);
}

function renderBracketColumns() {
  const list = document.getElementById('match-list');
  list.style.padding = '0';

  const colsHtml = BRACKET_ROUNDS.map(({ key, label, matches }) => {
    const slots = matches.map(m =>
      `<div class="btree-slot" data-match-id="${m.id}">${bracketCardHtml({ ...m, round: label })}</div>`
    ).join('');
    return `<div class="btree-col" data-round="${key}">
      <div class="btree-col-label">${label}</div>
      ${slots}
    </div>`;
  }).join('');

  list.innerHTML = `<div class="btree-wrap btree-wrap--cols" id="btree-wrap">
    <div class="btree-cols" id="btree-cols">${colsHtml}</div>
  </div>`;

  attachBracketCardListeners(list);
}

function renderBracketTree() {
  const list = document.getElementById('match-list');
  list.style.padding = '0';

  // Split rounds into pairs — each pair resets slot heights independently
  const PAIRS = [
    [BRACKET_ROUNDS[0], BRACKET_ROUNDS[1]], // R32 + R16
    [BRACKET_ROUNDS[2], BRACKET_ROUNDS[3]], // QF + SF
    [BRACKET_ROUNDS[4]],                    // Final
  ];

  const pairsHtml = PAIRS.map(pair => {
    const colsHtml = pair.map(({ key, label, matches }) => {
      const slots = matches.map(m =>
        `<div class="btree-slot" data-match-id="${m.id}">${bracketCardTreeHtml({ ...m, round: label })}</div>`
      ).join('');
      return `<div class="btree-col" data-round="${key}">
        <div class="btree-col-label">${label}</div>
        ${slots}
      </div>`;
    }).join('');
    const hasSvg = pair.length === 2;
    return `<div class="btree-pair">
      <div class="btree-cols">${colsHtml}</div>
      ${hasSvg ? '<svg class="btree-pair-svg"></svg>' : ''}
    </div>`;
  }).join('');

  list.innerHTML = `<div class="btree-wrap btree-wrap--tree" id="btree-wrap">
    <div class="btree-pairs" id="btree-pairs">${pairsHtml}</div>
  </div>`;

  attachBracketCardListeners(list);
  requestAnimationFrame(() => requestAnimationFrame(drawBracketConnectors));
}

function drawBracketConnectors() {
  const wrap = document.getElementById('btree-wrap');
  if (!wrap) return;
  const color = getComputedStyle(document.documentElement).getPropertyValue('--border').trim() || '#334155';

  wrap.querySelectorAll('.btree-pair').forEach(pairEl => {
    const svg = pairEl.querySelector('.btree-pair-svg');
    if (!svg) return;

    const pairRect = pairEl.getBoundingClientRect();
    const toLocal = rect => ({
      left:  rect.left  - pairRect.left,
      right: rect.right - pairRect.left,
      cy:    rect.top   + rect.height / 2 - pairRect.top,
    });

    let lines = '';
    pairEl.querySelectorAll('.btree-cols > .btree-col:nth-child(2) .btree-slot[data-match-id]').forEach(slot => {
      const childId = slot.dataset.matchId;
      const preds = BRACKET_PREDECESSORS[childId];
      if (!preds) return;
      const childCard = slot.querySelector('.match-card');
      const pACard = pairEl.querySelector(`.btree-cols > .btree-col:nth-child(1) .btree-slot[data-match-id="${preds[0]}"] .match-card`);
      const pBCard = pairEl.querySelector(`.btree-cols > .btree-col:nth-child(1) .btree-slot[data-match-id="${preds[1]}"] .match-card`);
      if (!childCard || !pACard || !pBCard) return;

      const child = toLocal(childCard.getBoundingClientRect());
      const pA    = toLocal(pACard.getBoundingClientRect());
      const pB    = toLocal(pBCard.getBoundingClientRect());
      const midX  = (pA.right + child.left) / 2;

      lines += `<line x1="${pA.right}" y1="${pA.cy}" x2="${midX}" y2="${pA.cy}" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>`;
      lines += `<line x1="${pB.right}" y1="${pB.cy}" x2="${midX}" y2="${pB.cy}" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>`;
      lines += `<line x1="${midX}" y1="${pA.cy}" x2="${midX}" y2="${pB.cy}" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>`;
      lines += `<line x1="${midX}" y1="${child.cy}" x2="${child.left}" y2="${child.cy}" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>`;
    });

    const colsEl = pairEl.querySelector('.btree-cols');
    svg.setAttribute('width',  colsEl.scrollWidth);
    svg.setAttribute('height', colsEl.scrollHeight);
    svg.style.width  = colsEl.scrollWidth  + 'px';
    svg.style.height = colsEl.scrollHeight + 'px';
    svg.innerHTML = lines;
  });
}

// ─── STADIUMS VIEW ───────────────────────────────────────────────────────────
function renderStadiums() {
  document.getElementById('group-chips').style.display = 'none';
  document.getElementById('team-chips').style.display = 'none';
  const list = document.getElementById('match-list');

  const stMatches = MATCHES.filter(m => m.venue === currentStadium);
  const city = stMatches[0]?.city || '';

  const stBracket = BRACKET_ROUNDS.flatMap(({ label, matches }) =>
    matches.map(m => ({ ...m, round: label }))
  ).filter(m => m.venue && m.venue.split(',')[0].trim() === currentStadium);

  const allEntries = [
    ...stMatches.map(m => ({ type: 'group', m, ts: m.kickoff.getTime() })),
    ...stBracket.map(m => ({ type: 'bracket', m, ts: m.date ? new Date(m.date).getTime() : Infinity })),
  ].sort((a, b) => a.ts - b.ts);

  const byDate = {};
  allEntries.forEach(({ type, m, ts }) => {
    const key = ts === Infinity ? 'tbd' : localDateKey(type === 'group' ? m.kickoff : new Date(m.date));
    if (!byDate[key]) byDate[key] = [];
    byDate[key].push({ type, m });
  });

  let html = `
    <div class="stadium-detail-back" id="stadium-back">← Back</div>
    <div class="stadium-detail-title">${currentStadium}</div>
    <div class="stadium-detail-city">${city}</div>`;

  Object.keys(byDate).sort().forEach(key => {
    const label = key === 'tbd' ? 'Date TBD' : fmtDayHeader.format(new Date(key + 'T12:00:00'));
    html += `<div class="date-header">${label}</div>`;
    byDate[key].forEach(({ type, m }) => {
      html += type === 'group' ? cardHtml(m) : bracketCardHtml(m);
    });
  });

  list.innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'instant' });

  document.getElementById('stadium-back').addEventListener('click', () => {
    currentStadium = null;
    const st = prevState || { tab: 'group-phase', group: 'UPCOMING', teamFilter: null };
    prevState = null;
    currentTab = st.tab;
    currentGroup = st.group;
    currentTeamFilter = st.teamFilter;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[data-tab="${currentTab}"]`).classList.add('active');
    if (currentTab === 'brackets') {
      renderBracketChips(); renderBrackets();
    } else {
      renderChips(); renderTeamChips(); renderMatchList();
    }
  });

  list.querySelectorAll('.match-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.card-venue') || e.target.closest('.card-group') || e.target.closest('.card-cal-btn')) return;
      const clickX = e.clientX;
      const rect = card.getBoundingClientRect();
      const teamName = clickX < rect.left + rect.width / 2 ? card.dataset.home : card.dataset.away;
      selectTeam(teamName);
    });
  });

  list.querySelectorAll('.card-group[data-group]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      currentStadium = null;
      prevState = null;
      currentGroup = el.dataset.group;
      currentTeamFilter = null;
      currentTab = 'group-phase';
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector('.tab[data-tab="group-phase"]').classList.add('active');
      renderChips(); renderTeamChips(); renderMatchList();
      window.scrollTo({ top: 0, behavior: 'instant' });
      const chip = document.querySelector(`#group-chips .chip[data-group="${currentGroup}"]`);
      if (chip) chip.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'instant' });
    });
  });

  list.querySelectorAll('.card-cal-btn[data-cal-id]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const m = MATCHES.find(x => x.id === el.dataset.calId);
      if (m) downloadICS(m);
    });
  });
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    currentTab = el.dataset.tab;
    currentStadium = null;
    prevState = null;
    if (currentTab === 'brackets') {
      document.getElementById('group-chips').style.display = 'none';
      document.getElementById('team-chips').style.display = 'none';
      renderBracketChips(); renderBrackets();
    } else {
      renderChips(); renderTeamChips(); renderMatchList();
    }
  });
});


// ─── INIT ─────────────────────────────────────────────────────────────────────
renderChips();
  renderTeamChips();
  renderMatchList();
setInterval(tickCountdowns, 1000);
window.addEventListener('resize', () => {
  if (currentTab === 'brackets' && bracketView === 'tree') drawBracketConnectors();
});
fetchLiveData();
</script>
</body>
</html>
